<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Content-Ops 控制台</title>
  <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #334155;margin-bottom:30px}
.header h1{font-size:24px;font-weight:600}
.user-info{display:flex;gap:15px;align-items:center}
.tabs{display:flex;gap:10px;margin-bottom:30px;border-bottom:2px solid #334155}
.tab{padding:12px 24px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{background:#1e293b}
.tab.active{border-bottom-color:#3b82f6;color:#3b82f6}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:20px}
.card-title{font-size:18px;font-weight:600;margin-bottom:15px}
button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-secondary{background:#475569;color:#fff}
.btn-secondary:hover{background:#64748b}
.btn-success{background:#10b981;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
input,select,textarea{width:100%;padding:10px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:14px}
textarea{min-height:120px;resize:vertical;font-family:inherit}
label{display:block;margin-bottom:8px;font-size:14px;font-weight:500}
.form-group{margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #334155}
th{font-weight:600;color:#94a3b8;font-size:13px;text-transform:uppercase}
tr:hover{background:#1e293b}
.badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500}
.badge-success{background:#10b98120;color:#10b981}
.badge-error{background:#ef444420;color:#ef4444}
.badge-warning{background:#f59e0b20;color:#f59e0b}
.badge-info{background:#3b82f620;color:#3b82f6}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:30px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:20px;font-weight:600}
.hidden{display:none!important}
.flex{display:flex}
.gap-2{gap:10px}
.gap-4{gap:20px}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.mb-4{margin-bottom:20px}
.text-sm{font-size:13px}
.text-muted{color:#94a3b8}
.grid{display:grid}
.grid-2{grid-template-columns:repeat(2,1fr)}
.login-container{max-width:400px;margin:100px auto}
.multi-select{border:1px solid #334155;border-radius:8px;padding:10px;max-height:200px;overflow-y:auto;background:#0f172a}
.multi-select-item{padding:8px;cursor:pointer;border-radius:6px;margin-bottom:4px;display:flex;align-items:center}
.multi-select-item:hover{background:#334155}
.multi-select-item.selected{background:#3b82f620;border:1px solid #3b82f6}
.multi-select-item input{margin-right:8px}
pre{background:#0f172a;padding:12px;border-radius:8px;overflow-x:auto;font-size:13px}
  </style>
</head>
<body>
<div id="loginView" class="login-container">
  <div class="card">
    <h1 class="mb-4">登录</h1>
    <div class="form-group">
      <label>用户名</label>
      <input id="loginUser" value="kyochen"/>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="loginPass" type="password" value="kyochen28"/>
    </div>
    <button class="btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="loginMsg" class="text-muted text-sm" style="margin-top:10px"></p>
  </div>
</div>

<div id="appView" class="hidden">
  <div class="container">
    <div class="header">
      <h1>Content-Ops 控制台</h1>
      <div class="user-info">
        <span id="username" class="text-muted"></span>
        <button class="btn-secondary btn-sm" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('accounts')">账号管理</div>
      <div class="tab" onclick="switchTab('records')">发布记录</div>
      <div class="tab" onclick="switchTab('publish')">发布工作台</div>
    </div>

    <div id="accountsTab">
      <div class="flex justify-between items-center mb-4">
        <h2>授权账号列表</h2>
        <button class="btn-primary" onclick="showAddAccountModal()">+ 新增账号授权</button>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>账号名称</th>
              <th>平台</th>
              <th>认证方式</th>
              <th>状态</th>
              <th>授权时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="accountsTable"></tbody>
        </table>
      </div>
    </div>

    <div id="recordsTab" class="hidden">
      <h2 class="mb-4">发布记录</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>标题</th>
              <th>平台</th>
              <th>账号</th>
              <th>状态</th>
              <th>发布时间</th>
              <th>链接</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordsTable"></tbody>
        </table>
      </div>
    </div>

    <div id="publishTab" class="hidden">
      <h2 class="mb-4">发布工作台</h2>
      <div class="grid grid-2 gap-4">
        <div class="card">
          <h3 class="card-title">选择发布账号（可多选）</h3>
          <div id="accountSelector" class="multi-select"></div>
        </div>
        <div class="card">
          <h3 class="card-title">发布内容</h3>
          <div class="form-group">
            <label>标题（可选）</label>
            <input id="pubTitle" placeholder="留空自动生成"/>
          </div>
          <div class="form-group">
            <label>正文</label>
            <textarea id="pubText" placeholder="输入要发布的内容"></textarea>
          </div>
          <div class="form-group">
            <label>链接（可选）</label>
            <input id="pubLink" placeholder="https://"/>
          </div>
          <div class="form-group">
            <label>图片/视频</label>
            <input id="pubFiles" type="file" multiple/>
          </div>
          <button class="btn-success" onclick="publishContent()" style="width:100%">发布到选中账号</button>
          <p id="pubMsg" class="text-muted text-sm" style="margin-top:10px"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="addAccountModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">新增账号授权</h2>
      <button class="btn-secondary btn-sm" onclick="closeModal('addAccountModal')">关闭</button>
    </div>
    <div class="form-group">
      <label>平台</label>
      <select id="newPlatform">
        <option value="x">Twitter/X</option>
        <option value="youtube">YouTube</option>
        <option value="reddit">Reddit</option>
        <option value="discord">Discord</option>
        <option value="slack">Slack</option>
        <option value="facebook">Facebook</option>
        <option value="instagram">Instagram</option>
        <option value="discord_bot">Discord Bot</option>
        <option value="pinterest">Pinterest</option>
        <option value="threads">Threads</option>
      </select>
    </div>
    <div class="form-group">
      <label>账号名称</label>
      <input id="newAccountName" placeholder="例如：主账号"/>
    </div>
    <div class="form-group">
      <label>认证方式</label>
      <select id="newAuthMode">
        <option value="composio">Composio 托管</option>
        <option value="self">自有实现</option>
      </select>
    </div>
    <div id="composioFields">
      <div class="form-group">
        <label>Composio Entity ID</label>
        <input id="newEntityId" placeholder="user_xxx"/>
      </div>
      <button class="btn-primary" onclick="generateAuthUrl()">生成授权链接</button>
      <pre id="authUrlDisplay" class="hidden" style="margin-top:10px"></pre>
    </div>
    <div id="selfFields" class="hidden">
      <p class="text-muted text-sm">自有实现需要手动配置 API 凭证，请联系管理员</p>
    </div>
  </div>
</div>

<div id="recordDetailModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">发布详情</h2>
      <button class="btn-secondary btn-sm" onclick="closeModal('recordDetailModal')">关闭</button>
    </div>
    <div id="recordDetail"></div>
  </div>
</div>

<script>
let accounts=[];
let records=[];
let selectedAccounts=new Set();

async function api(url,opts){
  const r=await fetch(url,opts);
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'请求失败');
  return d;
}

async function login(){
  const msg=document.getElementById('loginMsg');
  try{
    const res=await api('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        username:document.getElementById('loginUser').value,
        password:document.getElementById('loginPass').value
      })
    });
    msg.textContent='登录成功';
    document.getElementById('username').textContent=res.username;
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('appView').classList.remove('hidden');
    await loadData();
  }catch(e){
    msg.textContent='登录失败：'+e.message;
  }
}

async function logout(){
  await api('/api/logout',{method:'POST'});
  location.reload();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('accountsTab').classList.add('hidden');
  document.getElementById('recordsTab').classList.add('hidden');
  document.getElementById('publishTab').classList.add('hidden');
  document.getElementById(tab+'Tab').classList.remove('hidden');
  if(tab==='publish')renderAccountSelector();
}

async function loadData(){
  const [acc,rec]=await Promise.all([
    api('/api/accounts'),
    api('/api/publish-records?limit=100')
  ]);
  accounts=acc.items;
  records=rec.items;
  renderAccounts();
  renderRecords();
}

function renderAccounts(){
  const tbody=document.getElementById('accountsTable');
  tbody.innerHTML='';
  accounts.forEach(acc=>{
    const tr=document.createElement('tr');
    const authMode=acc.apiConfig?.auth_mode||'self';
    const status=acc.usable?'可用':'不可用';
    const statusClass=acc.usable?'badge-success':'badge-error';
    tr.innerHTML=`
      <td>${acc.name}</td>
      <td><span class="badge badge-info">${acc.platform}</span></td>
      <td>${authMode==='composio'?'Composio':'自有'}</td>
      <td><span class="badge ${statusClass}">${status}</span></td>
      <td class="text-sm text-muted">${acc.authorizedAt||'-'}</td>
      <td>
        ${authMode==='composio'?`<button class="btn-sm btn-secondary" onclick="checkConnection('${acc.id}')">检查连接</button>`:''}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderRecords(){
  const tbody=document.getElementById('recordsTable');
  tbody.innerHTML='';
  records.forEach(rec=>{
    const tr=document.createElement('tr');
    const statusMap={published:'success',failed:'error',approved:'warning'};
    const statusClass='badge-'+(statusMap[rec.status]||'info');
    const url=rec.lastResult?.url||'-';
    tr.innerHTML=`
      <td>${rec.title||rec.taskName||rec.id}</td>
      <td><span class="badge badge-info">${rec.platform||'-'}</span></td>
      <td class="text-sm">${rec.accountName||'-'}</td>
      <td><span class="badge ${statusClass}">${rec.status}</span></td>
      <td class="text-sm text-muted">${rec.publishedAt||rec.createdAt||'-'}</td>
      <td class="text-sm">${url!=='-'?`<a href="${url}" target="_blank" style="color:#3b82f6">查看</a>`:'-'}</td>
      <td><button class="btn-sm btn-secondary" onclick="showRecordDetail('${rec.id}')">详情</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function renderAccountSelector(){
  const div=document.getElementById('accountSelector');
  div.innerHTML='';
  accounts.filter(a=>a.usable).forEach(acc=>{
    const item=document.createElement('div');
    item.className='multi-select-item';
    if(selectedAccounts.has(acc.id))item.classList.add('selected');
    item.innerHTML=`
      <input type="checkbox" ${selectedAccounts.has(acc.id)?'checked':''} onchange="toggleAccount('${acc.id}')"/>
      <span>${acc.name} (${acc.platform})</span>
    `;
    div.appendChild(item);
  });
}

function toggleAccount(id){
  if(selectedAccounts.has(id))selectedAccounts.delete(id);
  else selectedAccounts.add(id);
  renderAccountSelector();
}

async function publishContent(){
  const msg=document.getElementById('pubMsg');
  if(selectedAccounts.size===0){
    msg.textContent='请至少选择一个账号';
    return;
  }
  const text=document.getElementById('pubText').value;
  if(!text){
    msg.textContent='请输入正文';
    return;
  }
  msg.textContent='发布中...';
  try{
    const files=document.getElementById('pubFiles').files;
    const media=[];
    for(const f of files){
      const base64=await fileToBase64(f);
      const res=await api('/api/upload-base64',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({filename:f.name,contentType:f.type,data:base64})
      });
      media.push(res.url);
    }
    let success=0;
    for(const accId of selectedAccounts){
      try{
        await api('/api/publish',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            targetAccountId:accId,
            title:document.getElementById('pubTitle').value,
            text,
            link:document.getElementById('pubLink').value,
            media
          })
        });
        success++;
      }catch(e){
        console.error('发布失败',accId,e);
      }
    }
    msg.textContent=`发布完成：${success}/${selectedAccounts.size} 成功`;
    document.getElementById('pubTitle').value='';
    document.getElementById('pubText').value='';
    document.getElementById('pubLink').value='';
    document.getElementById('pubFiles').value='';
    await loadData();
  }catch(e){
    msg.textContent='发布失败：'+e.message;
  }
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function showAddAccountModal(){
  document.getElementById('addAccountModal').classList.add('show');
  document.getElementById('newAuthMode').onchange=()=>{
    const mode=document.getElementById('newAuthMode').value;
    document.getElementById('composioFields').classList.toggle('hidden',mode!=='composio');
    document.getElementById('selfFields').classList.toggle('hidden',mode==='composio');
  };
}

async function generateAuthUrl(){
  const display=document.getElementById('authUrlDisplay');
  try{
    const res=await api('/api/composio/authorize',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        entity_id:document.getElementById('newEntityId').value,
        platform:document.getElementById('newPlatform').value
      })
    });
    display.textContent=res.auth_url;
    display.classList.remove('hidden');
    window.open(res.auth_url,'_blank');
  }catch(e){
    alert('生成失败：'+e.message);
  }
}

async function checkConnection(accountId){
  const acc=accounts.find(a=>a.id===accountId);
  if(!acc)return;
  try{
    const res=await api('/api/composio/check',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        entity_id:acc.apiConfig.composio_user_id,
        platform:acc.platform
      })
    });
    alert(res.connected?'✅ 已连接':'❌ 未连接');
  }catch(e){
    alert('检查失败：'+e.message);
  }
}

async function showRecordDetail(id){
  const rec=records.find(r=>r.id===id);
  if(!rec)return;
  const div=document.getElementById('recordDetail');
  div.innerHTML=`
    <div class="form-group">
      <label>标题</label>
      <p>${rec.title||rec.taskName||'-'}</p>
    </div>
    <div class="form-group">
      <label>正文</label>
      <pre>${rec.text||'-'}</pre>
    </div>
    <div class="form-group">
      <label>发布结果</label>
      <pre>${JSON.stringify(rec.publishResults||[],null,2)}</pre>
    </div>
  `;
  document.getElementById('recordDetailModal').classList.add('show');
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
}

async function checkSession(){
  try{
    const res=await api('/api/session');
    if(res.authenticated){
      document.getElementById('username').textContent=res.username;
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      await loadData();
    }
  }catch{}
}

checkSession();
</script>
</body>
</html>
